palette = 'catppuccin_mocha'

format = """
$os\
$username\
$directory\
$git_branch\
$git_status\
$fill\
$cmd_duration\
$line_break\
$character"""

add_newline = false

[os]
disabled = false
style = "fg:red"

[username]
show_always = true
style_user = "fg:peach"
style_root = "fg:red"
format = '[$user]($style)'

[directory]
style = "fg:yellow"
truncation_length = 3
truncation_symbol = "…/"

[git_branch]
style = "fg:green"
format = '[$symbol$branch]($style)'

[git_status]
style = "fg:green"
format = '[$all_status$ahead_behind]($style)'

[cmd_duration]
style = "fg:lavender"
show_milliseconds = false
min_time = 2000
format = "⏱️ $duration"

[character]
success_symbol = "[❯](fg:green)"
error_symbol = "[❯](fg:red)"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
