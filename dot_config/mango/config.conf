# ── DMS 自动生成 (颜色/布局/显示器) ──
source=~/.config/mango/dms/colors.conf
source=~/.config/mango/dms/layout.conf
source=~/.config/mango/dms/outputs.conf

# ── mango 核心模块 ──
source=./effect.conf       # 视觉效果 (模糊/阴影/圆角)
source=./animation.conf    # 动画配置 (类型/时长/曲线)
source=./tiling.conf       # 平铺布局参数
source=./appearance.conf   # 外观 (颜色/边框/spacing)
source=./overview.conf     # 概览模式
source=./misc.conf         # 杂项 (焦点/光标/布局循环)

# ── 子配置 ──
source=./env.conf          # 环境变量
source=./bind.conf         # 按键/鼠标/手势绑定
source=./rule.conf         # 窗口/图层规则
source=./monitor.conf      # 显示器规则
source=./tag.conf          # 标签布局规则

# ── 自启动 ──
exec-once=~/.config/mango/autostart.sh

# ── DMS 光标 (最后加载, 覆盖 misc.conf 中的光标设置) ──
source=./dms/cursor.conf
