# ── DMS 自动生成 (颜色/布局/显示器) ──
source=~/.config/mango/dms/colors.conf
source=~/.config/mango/dms/layout.conf
source=~/.config/mango/dms/outputs.conf

# ── mango 核心模块 ──
source=./effect.conf
source=./animation.conf
source=./tiling.conf
source=./appearance.conf
source=./overview.conf
source=./misc.conf

# ── 子配置 ──
source=./env.conf
source=./bind.conf
source=./rule.conf
source=./monitor.conf
source=./tag.conf

# ── 自启动 ──
exec-once=~/.config/mango/autostart.sh

# ── DMS 光标 (最后加载, 覆盖 misc.conf 中的光标设置) ──
source=./dms/cursor.conf
