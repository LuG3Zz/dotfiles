# ── 窗口模糊 ──
blur=0                     # 窗口模糊 (0=关闭, 性能考虑)
blur_layer=1               # 图层模糊 (面板/悬浮层等)
blur_optimized=1           # 优化模糊算法 (性能更好)

# 模糊参数
blur_params_num_passes = 2   # 模糊迭代次数, 越高越平滑但也越耗性能
blur_params_radius = 5       # 模糊半径(像素)
blur_params_noise = 0.02     # 噪点(减少色带)
blur_params_brightness = 0.9 # 亮度
blur_params_contrast = 0.9   # 对比度
blur_params_saturation = 1.2 # 饱和度

# ── 窗口阴影 ──
shadows = 1                  # 窗口阴影
layer_shadows = 1            # 图层阴影 (如 just-talk 悬浮层)
shadow_only_floating=1       # 仅浮动窗口有阴影
shadows_size = 12            # 阴影大小(像素)
shadows_blur = 15            # 阴影模糊度
shadows_position_x = 0       # 阴影水平偏移
shadows_position_y = 0       # 阴影垂直偏移
shadowscolor= 0x000000ff     # 阴影颜色(纯黑)

# ── 圆角 ──
no_radius_when_single=0      # 单窗口时也保持圆角

# ── 透明度 ──
focused_opacity=1.0          # 焦点窗口不透明
unfocused_opacity=0.85       # 非焦点窗口略微透明
