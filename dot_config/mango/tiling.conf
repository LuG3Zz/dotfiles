# ── Scroller (横滚布局) ──
# 窗口沿水平方向排列, 适合多窗口横向浏览
scroller_structs=20              # 最大结构数量
scroller_default_proportion=0.8  # 默认窗口宽度比例
scroller_focus_center=0           # 焦点窗口是否居中
scroller_prefer_center=1          # 切换时优先居中
edge_scroller_pointer_focus=1     # 鼠标移到边缘自动滚屏
scroller_default_proportion_single=1.0  # 单窗口时占满
scroller_proportion_preset=0.5,0.8,1.0 # 预设宽度比例

# ── Master-Stack (主从平铺) ──
# master 区 + stack 区, 适合代码/文档编辑
new_is_master=1                  # 新窗口成为 master
smartgaps=0                      # 单窗口时保留间距
default_mfact=0.55               # master 区占比 (55%)
default_nmaster=1                # master 区窗口数
