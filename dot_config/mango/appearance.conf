# ── Scratchpad 尺寸比例(相对屏幕) ──
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9

# ── 颜色 (RGBA 十六进制: 0xRRGGBBAA) ──
# 配色对齐 DMS 蓝色主题:
#   primary_container = #2c4678 (深蓝)
#   primary = #aec6ff (浅蓝)
#
# 桌面背景: 深空蓝黑
rootcolor=0x1a1a2eff
# 非焦点窗口边框: DMS primary_container
bordercolor=0x2c4678ff
# 焦点窗口边框: DMS primary (与 bar 一致)
focuscolor=0xaec6ffff
# 最大化窗口边框: 中蓝
maximizescreencolor=0x7ea8e0ff
# 紧急提醒边框: 醒目红色
urgentcolor=0xe05050ff
# Scratchpad 边框: 柔和蓝
scratchpadcolor=0x6b8fcfff
# 全局窗口边框: 浅紫
globalcolor=0x9973d6ff
# 覆盖层边框: 青绿
overlaycolor=0x5cb899ff
