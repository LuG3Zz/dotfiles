# ── Scratchpad 尺寸比例(相对屏幕) ──
scratchpad_width_ratio=0.8    # 宽度比例
scratchpad_height_ratio=0.9   # 高度比例

# ── 颜色 (RGBA 十六进制: 0xRRGGBBAA) ──
# 配色对齐 DMS 蓝色主题:
#   primary_container = #2c4678 (深蓝)
#   primary = #aec6ff (浅蓝)

rootcolor=0x1a1a2eff          # 桌面背景: 深空蓝黑
bordercolor=0x2c4678ff        # 非焦点窗口边框: DMS primary_container
focuscolor=0xaec6ffff         # 焦点窗口边框: DMS primary(与 bar 一致)
maximizescreencolor=0x7ea8e0ff # 最大化窗口边框: 中蓝
urgentcolor=0xe05050ff        # 紧急提醒边框: 醒目红色
scratchpadcolor=0x6b8fcfff    # Scratchpad 边框: 柔和蓝
globalcolor=0x9973d6ff        # 全局窗口边框: 浅紫
overlaycolor=0x5cb899ff       # 覆盖层边框: 青绿
