# ── XWayland ──
# 保持 XWayland 后台运行 (加快 X11 应用启动)
xwayland_persistence=1

# ── 合成器 ──
# 禁用 syncobj (减少兼容性问题)
syncobj_enable=0

# ── 边框 ──
# 单窗口时也显示边框 (0=隐藏边框, 1=显示)
no_border_when_single=0
# 悬浮窗口吸附对齐
enable_floating_snap=1
# 吸附距离(像素)
snap_distance=50

# ── 滚动绑定超时(毫秒) ──
axis_bind_apply_timeout=100

# ── 焦点行为 ──
# 窗口激活时立即获得焦点
focus_on_activate=1
# 禁用鼠标滑动焦点 (sloppy focus)
sloppyfocus=0
# 焦点切换时光标跟随窗口
warpcursor=1
# 跨显示器/标签时不移焦
focus_cross_monitor=0
focus_cross_tag=0

# ── 光标 (由 DMS dms/cursor.conf 管理, 此处不重复设置) ──
# cursor_size 和 cursor_theme 已由 DMS 自动生成
# 静默超时后隐藏光标(秒): 0=不隐藏
cursor_hide_timeout=0

# ── 布局循环 ──
circle_layout=tile,deck,center_tile,right_tile,vertical_tile,vertical_grid,vertical_deck,vertical_scroller

# ── 功能开关 ──
# 拖动窗口到标签栏切换标签
drag_tile_to_tile=1
# 单例 scratchpad (只保留一个)
single_scratchpad=1

# Keyboard
repeat_rate=25
repeat_delay=600
numlockon=1
xkb_rules_layout=us,ru

# Trackpad
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
mouse_natural_scrolling=0
trackpad_natural_scrolling=0
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1
