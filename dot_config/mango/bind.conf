# reload config
bind=SUPER,r,spawn_shell,bash ~/.config/mango/scripts/config_check.sh
bind=SUPER,r,reload_config

# menu and terminal
# bind=SUPER+SHIFT,Return,spawn,alacritty
bind=SUPER,space,spawn,dms ipc call spotlight toggle
# bind=Alt,space,spawn,fuzzel

# exit super+m
# bind=SUPER,code:58,quit
bind=SUPER,m,quit
# killclient super+q
# bind=ALT,code:24,killclient,
bind=SUPER,q,killclient,

# switch window focus
bind=SUPER,Tab,focusstack,next
bind=SUPER,u,focuslast
bind=SUPER,h,focusdir,left
bind=SUPER,l,focusdir,right
bind=SUPER,k,focusdir,up
bind=SUPER,j,focusdir,down

# move window (ctrl+super+hjkl)
bind=CTRL+SUPER,h,smartmovewin,left
bind=CTRL+SUPER,j,smartmovewin,down
bind=CTRL+SUPER,k,smartmovewin,up
bind=CTRL+SUPER,l,smartmovewin,right

# swap window (super+shift+hjkl)
bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,j,exchange_client,down
bind=SUPER+SHIFT,k,exchange_client,up
bind=SUPER+SHIFT,l,exchange_client,right

# resizewin (alt+super+hjkl)
bind=ALT+SUPER,h,smartresizewin,left
bind=ALT+SUPER,j,smartresizewin,down
bind=ALT+SUPER,k,smartresizewin,up
bind=ALT+SUPER,l,smartresizewin,right

# switch window status
bind=SUPER,g,toggleglobal,
bind=SUPER+SHIFT,space,centerwin,
bind=ALT,Tab,toggleoverview,0
bind=SUPER,T,togglefloating,
bind=SUPER,a,togglemaximizescreen,
bind=SUPER,f,togglefullscreen,
bind=SUPER+SHIFT,f,set_proportion,1.0
bind=SUPER,i,minimized,
bind=SUPER,o,toggleoverlay,
bind=SUPER+SHIFT,I,restore_minimized
bind=SUPER,z,toggle_scratchpad

# scroller layout
bind=SUPER,e,spawn,nautilus --new-window
bind=SUPER,x,switch_proportion_preset,

# tile layout
bind=SUPER,bracketright,incnmaster,1
bind=SUPER,bracketleft,incnmaster,-1
bind=SUPER,s,toggle_named_scratchpad,yazi,none,alacritty --class yaziscratch -t yaziscratch -e tmux new-session -A -s yazi yazi

# switch layout
bind=CTRL+SUPER,i,setlayout,tile
bind=SUPER,n,switch_layout
bind=SUPER+SHIFT,s,setlayout,scroller
bind=SUPER+SHIFT,m,setlayout,monocle
bind=SUPER+SHIFT,g,setlayout,grid
bind=SUPER+SHIFT,d,setlayout,dwindle

# tag switch / view scroll
bind=CTRL+SHIFT,Left,viewtoleft,0
bind=CTRL,Left,viewtoleft_have_client,0
bind=CTRL+SHIFT,Right,viewtoright,0
bind=CTRL,Right,viewtoright_have_client,0
bind=CTRL+SUPER,Left,tagtoleft,0
bind=CTRL+SUPER,Right,tagtoright,0

# bind=Ctrl,1,view,1,0
bind=Ctrl,2,view,2,0
bind=Ctrl,3,view,3,0
bind=Ctrl,4,view,4,0
bind=Ctrl,5,view,5,0
bind=Ctrl,6,view,6,0
bind=Ctrl,7,view,7,0
bind=Ctrl,8,view,8,0
bind=Ctrl,9,view,9,0

bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0

bind=ctrl+Super,1,toggletag,1
bind=ctrl+Super,2,toggletag,2
bind=ctrl+Super,3,toggletag,3
bind=ctrl+Super,4,toggletag,4
bind=ctrl+Super,5,toggletag,5
bind=ctrl+Super,6,toggletag,6
bind=ctrl+Super,7,toggletag,7
bind=ctrl+Super,8,toggletag,8
bind=ctrl+Super,9,toggletag,9

bind=Super,1,view,1,0
bind=Super,2,view,2,0
bind=Super,3,view,3,0
bind=Super,4,view,4,0
bind=Super,5,view,5,0
bind=Super,6,view,6,0
bind=Super,7,view,7,0
bind=Super,8,view,8,0
bind=Super,9,view,9,0

# monitor switch
bind=super+shift,Left,focusmon,left
bind=super+shift,Right,focusmon,right
# bind=super+shift,Up,focusmon,up
# bind=super+shift,Down,focusmon,down
bind=SUPER,comma,focusmon,up
bind=SUPER,period,focusmon,down
bind=SUPER+Alt,Left,setmfact,-0.05
bind=SUPER+Alt,Right,setmfact,+0.05
# bind=SUPER+Alt,Up,tagmon,up
# bind=SUPER+Alt,Down,tagmon,down
bind=SUPER+shift,comma,tagmon,up
bind=SUPER+shift,period,tagmon,down

# gaps
bind=SUPER,equal,incgaps,1
bind=SUPER,minus,incgaps,-1
bind=SUPER+SHIFT,R,togglegaps


# Mouse Button Bindings
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=super,btn_middle,set_proportion,0.5
mousebind=SUPER,btn_right,moveresize,curresize
mousebind=SUPER+CTRL,btn_left,minimized
mousebind=SUPER+CTRL,btn_right,killclient
mousebind=SUPER+CTRL,btn_middle,togglefullscreen
mousebind=NONE,btn_middle,togglemaximizescreen,0

# Axis Bindings
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client
axisbind=super,UP,focusdir,left
axisbind=super,DOWN,focusdir,right
axisbind=shift+super,UP,exchange_client,left
axisbind=shift+super,DOWN,exchange_client,right

# Gesturebind
gesturebind=none,left,3,focusdir,left
gesturebind=none,right,3,focusdir,right
gesturebind=none,up,3,focusdir,up
gesturebind=none,down,3,focusdir,down
gesturebind=none,left,4,viewtoleft_have_client
gesturebind=none,right,4,viewtoright_have_client
gesturebind=none,up,4,toggleoverview,1
gesturebind=none,down,4,toggleoverview,1

# brightness and volume
bind=none,XF86AudioRaiseVolume,spawn,dms ipc call audio increment 3
bind=none,XF86AudioLowerVolume,spawn,dms ipc call audio decrement 3
bind=none,XF86AudioMute,spawn,dms ipc call audio mute
bind=none,XF86MonBrightnessUp,spawn_shell,dms ipc call brightness increment 5 ""
bind=none,XF86MonBrightnessDown,spawn_shell,dms ipc call brightness decrement 5 ""

#custom app bind
bind=SUPER,Return,spawn,alacritty
bind=SUPER+SHIFT,Return,zoom
bind=CTRL+SUPER,Return,spawn,alacritty -e yazi
bind=none,Print,spawn_shell,grim -g "$(slurp -b '#2E2A1E55' -c '#fb751bff')" -t ppm - | satty -f -
bind=SUPER,Print,spawn_shell,bash ~/.config/mango/scripts/ocrshot.sh
bind=ALT,Print,spawn,wayscrollshot
bind=SUPER,w,spawn,dms ipc call dankdash wallpaper
bind=SUPER,b,spawn,dms ipc call bar toggle index 0
bind=SUPER,v,spawn,dms ipc call clipboard toggle
bind=SUPER+CTRL+SHIFT,l,spawn,dms ipc call lock lock
bind=CTRL+ALT,BackSpace,spawn,dms ipc call notifications toggle
bind=SUPER,p,spawn,bash ~/.config/mango/scripts/monitor.sh
bind=SUPER+SHIFT,p,spawn,bash ~/.config/mango/scripts/virmon.sh

# 按键速查表（悬浮 scratchpad）
bind=SUPER,slash,toggle_named_scratchpad,cheatsheet,none,alacritty --class cheatsheet -e ~/.config/mango/scripts/cheatsheet.sh

